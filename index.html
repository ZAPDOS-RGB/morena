```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morena Rosa - Sistema</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: black;
    color: white;
    padding: 15px;
    text-align: center;
}

nav {
    background: #ff4da6;
    padding: 10px;
    text-align: center;
}

nav button {
    margin: 5px;
    padding: 10px;
    border: none;
    cursor: pointer;
}

.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 700px;
    margin: auto;
}

input, select {
    padding: 10px;
    margin: 5px;
    width: 90%;
}

button.action {
    background: #ff4da6;
    color: white;
    padding: 10px;
    border: none;
}

ul {
    text-align: left;
}
</style>
</head>

<body>

<header>
<h1>Morena Rosa - Sistema de Pedidos</h1>
</header>

<nav>
<button onclick="mostrar('cadastro')">Cadastrar Pedido</button>
<button onclick="mostrar('lista')">Ver Pedidos</button>
<button onclick="mostrar('rastreio')">Rastrear</button>
<button onclick="mostrar('chat')">Atendimento</button>
</nav>

<!-- CADASTRO -->
<div id="cadastro" class="section active">
<div class="box">
<h2>Novo Pedido</h2>
<input id="nome" placeholder="Nome do cliente">
<input id="codigo" placeholder="Código do pedido">
<select id="status">
<option>Em preparo</option>
<option>Enviado</option>
<option>Entregue</option>
</select>
<button class="action" onclick="salvar()">Salvar</button>
</div>
</div>

<!-- LISTA -->
<div id="lista" class="section">
<div class="box">
<h2>Pedidos</h2>
<ul id="listaPedidos"></ul>
</div>
</div>

<!-- RASTREIO -->
<div id="rastreio" class="section">
<div class="box">
<h2>Rastrear Pedido</h2>
<input id="buscarCodigo" placeholder="Digite o código">
<button class="action" onclick="buscar()">Buscar</button>
<p id="resultado"></p>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="section">
<div class="box">
<h2>Atendimento</h2>
<div id="chatBox"></div>
<input id="msg">
<button onclick="enviar()">Enviar</button>
</div>
</div>

<script>

let pedidos = [];

/* trocar tela */
function mostrar(sec){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(sec).classList.add('active');
}

/* salvar pedido */
function salvar(){
    let nome = document.getElementById("nome").value;
    let codigo = document.getElementById("codigo").value;
    let status = document.getElementById("status").value;

    pedidos.push({nome, codigo, status});
    alert("Pedido cadastrado!");
    atualizarLista();
}

/* atualizar lista */
function atualizarLista(){
    let lista = document.getElementById("listaPedidos");
    lista.innerHTML = "";

    pedidos.forEach(p=>{
        lista.innerHTML += `<li>${p.nome} - ${p.codigo} - ${p.status}</li>`;
    });
}

/* buscar pedido */
function buscar(){
    let codigo = document.getElementById("buscarCodigo").value;
    let pedido = pedidos.find(p=>p.codigo == codigo);

    if(pedido){
        document.getElementById("resultado").innerText = pedido.status;
    } else {
        document.getElementById("resultado").innerText = "Pedido não encontrado";
    }
}

/* chat */
function enviar(){
    let msg = document.getElementById("msg").value.toLowerCase();
    let chat = document.getElementById("chatBox");

    chat.innerHTML += "<p><b>Você:</b> "+msg+"</p>";

    let resp = "Não entendi.";

    if(msg.includes("prazo")) resp = "5 a 10 dias úteis.";
    if(msg.includes("troca")) resp = "Até 7 dias.";

    chat.innerHTML += "<p><b>Bot:</b> "+resp+"</p>";
}

</script>

</body>
</html>
```
